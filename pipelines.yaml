# Pipeline Configuration: Superpowers + gstack + Shaping + Review Loop
#
# Skill sources:
# - Superpowers plugin: engineering discipline (TDD, debugging, verification, code review)
# - gstack: specialist skills + persistent headless browser (security, QA, perf, deploy)
# - Shaping skills: Shape Up methodology (vendored)
# - Review loop: automated Codex code review (vendored, requires Codex CLI + jq)
# - External: Apollo, Hermes, Delphi, Kalos, Pencil, UI-Val
#
# Prerequisites:
# - Superpowers plugin: claude plugin install superpowers
# - gstack: git clone https://github.com/garrytan/gstack ~/.claude/skills/gstack && cd ~/.claude/skills/gstack && ./setup
# - Shaping skills: vendored in this repo
# - Review loop: vendored in this repo (requires Codex CLI + jq)
# - ui-val: https://github.com/AshDevFr/ui-val (install separately)

phases:
  explore:
    order: 10
    description: Understand the problem space
  shape:
    order: 20
    description: Define requirements and solution approaches
  plan:
    order: 30
    description: Create implementation plan
  build:
    order: 40
    description: Implement the solution
  verify:
    order: 50
    description: Verify correctness and quality
  simplify:
    order: 55
    description: Review changed code for reuse, quality, and efficiency
  review:
    order: 60
    description: Independent review
  finish:
    order: 70
    description: Integrate and ship
  release:
    order: 80
    description: Version, changelog, and project config updates

skills:
  # --- Explore phase ---
  # gstack office-hours: validate the idea before designing it
  # YC-style forcing questions (demand, wedge, specificity) or builder-mode brainstorm
  office-hours:
    source: gstack
    phase: explore
    type: phase

  # Superpowers brainstorming: collaborative design before implementation
  brainstorming:
    source: plugin/superpowers
    phase: explore
    type: phase

  # Pencil prototyping: visual prototyping on Pencil.dev canvas
  # Invoked when UI/visual discussions arise during explore or shape
  pencil-prototyping:
    source: external
    phase: explore
    type: phase

  # Kalos: design governance — set up tokens, validate artifacts, sync to Pencil
  kalos:
    source: external
    phase: shape
    type: phase

  # --- Shape phase ---
  # Shape Up methodology: iterate on requirements (R) and solution shapes (S)
  shaping:
    source: vendor/shaping-skills
    phase: shape
    type: phase

  # Map system into UI/code affordances and wiring
  breadboarding:
    source: vendor/shaping-skills
    phase: shape
    type: phase

  # --- Plan phase ---
  # Superpowers writing-plans: bite-sized implementation tasks with TDD
  writing-plans:
    source: plugin/superpowers
    phase: plan
    type: phase

  # gstack eng review: architecture/test plan review gate after writing-plans
  # Staff-eng perspective on data flow, edge cases, performance, test coverage
  plan-eng-review:
    source: gstack
    phase: plan
    type: phase

  # --- Build phase ---
  # Superpowers TDD: red-green-refactor cycle
  test-driven-development:
    source: plugin/superpowers
    phase: build
    type: phase

  # Superpowers debugging: systematic root-cause analysis
  systematic-debugging:
    source: plugin/superpowers
    phase: build
    type: phase

  # --- Verify phase ---
  # Superpowers verification: run tests and confirm before claiming done
  verification-before-completion:
    source: plugin/superpowers
    phase: verify
    type: phase

  # Delphi: generate and execute comprehensive test scenarios (guided cases)
  delphi:
    source: external
    phase: verify
    type: phase

  # gstack QA: real browser testing with persistent Chromium (~100ms commands)
  # Tests user flows, finds bugs, fixes them atomically, re-verifies
  qa:
    source: gstack
    phase: verify
    type: phase

  # Kalos check: validate .pen files against design tokens/rules (modifier)
  # Only triggers when .pen design files are changed
  kalos-check:
    source: external
    skill-ref: kalos
    phase: verify
    type: modifier
    triggers:
      files-changed:
        - "*.pen"

  # UI validation: screenshot-based visual verification (modifier)
  # Only triggers when frontend files are changed
  ui-val:
    source: external
    phase: verify
    type: modifier
    triggers:
      files-changed:
        - "*.tsx"
        - "*.css"
        - "*.html"
        - "*.vue"
        - "*.svelte"

  # gstack benchmark: Core Web Vitals + page load perf regression detection (modifier)
  # Only triggers when frontend files are changed
  benchmark:
    source: gstack
    phase: verify
    type: modifier
    triggers:
      files-changed:
        - "*.tsx"
        - "*.css"
        - "*.html"
        - "*.vue"
        - "*.svelte"
        - "*.js"
        - "*.ts"

  # --- Simplify phase ---
  # Simplify: invoke /simplify command to review changed code
  simplify:
    source: external
    phase: simplify
    type: phase
    invoke: /simplify

  # --- Review phase ---
  # Automated Codex review loop (requires Codex CLI + jq)
  review-loop:
    source: vendor/review-loop
    phase: review
    type: phase

  # Superpowers code review: structured review checklist
  requesting-code-review:
    source: plugin/superpowers
    phase: review
    type: phase

  # gstack CSO: OWASP Top 10 + STRIDE threat model + secrets archaeology
  # Infrastructure-first security audit with active verification
  cso:
    source: gstack
    phase: review
    type: phase

  # gstack Codex: cross-model review — independent second opinion from OpenAI
  # Requires Codex CLI installed
  codex:
    source: gstack
    phase: review
    type: phase

  # --- Finish phase ---
  # Superpowers: merge, PR, or cleanup workflow
  finishing-a-development-branch:
    source: plugin/superpowers
    phase: finish
    type: phase

  # Hermes: generate internal, external, and marketing documentation
  hermes:
    source: external
    phase: finish
    type: phase

  # --- Release phase ---
  # Apollo: version bumps, changelog, and project config updates
  apollo:
    source: external
    phase: release
    type: phase

  # gstack canary: post-deploy production monitoring
  # Watches for console errors, perf regressions, page failures after deploy
  canary:
    source: gstack
    phase: release
    type: phase

# Skills available at any point regardless of current phase
always-available:
  - think-different
  - learning
  - dispatching-parallel-agents
  - subagent-driven-development
  - using-git-worktrees
  - executing-plans
  - receiving-code-review
  - writing-skills
  - pencil-prototyping
  - kalos
  # gstack utilities
  - browse           # persistent headless browser on demand
  - careful          # destructive command warnings
  - retro            # weekly engineering retrospective
  - investigate      # lightweight debugging alternative

# Multi-agent configuration
# When enabled, the conductor dispatches independent skills within a phase
# as parallel subagents instead of running them sequentially.
multi-agent:
  enabled: true
  # Skill chains that must run in order within a phase
  sequential-dependencies:
    - [shaping, breadboarding]
    - [writing-plans, plan-eng-review]
  # Skills dispatched in an isolated git worktree (clean repo copy)
  worktree-skills:
    - review-loop
    - codex
    - cso

pipelines:
  # Quick bug fix or small tweak — skip exploration and planning
  small-fix:
    description: Bug fix or small tweak with clear approach
    phases: [build, verify, simplify, finish, release]
    skills:
      build:
        - systematic-debugging
        - test-driven-development
      verify:
        - verification-before-completion
      simplify:
        - simplify
      finish:
        - finishing-a-development-branch
        - hermes
      release:
        - apollo

  # Standard feature — explore the idea, plan, build, review, ship
  feature:
    description: New feature with clear requirements
    phases: [explore, plan, build, verify, simplify, review, finish, release]
    skills:
      explore:
        - office-hours
        - brainstorming
        - pencil-prototyping
        - kalos
      plan:
        - writing-plans
        - plan-eng-review
      build:
        - test-driven-development
      verify:
        - verification-before-completion
        - delphi
        - qa
      simplify:
        - simplify
      review:
        - requesting-code-review
        - cso
      finish:
        - finishing-a-development-branch
        - hermes
      release:
        - apollo

  # Complex/0-to-1 work — full Shape Up methodology before implementation
  complex:
    description: Multi-approach problem, 0-to-1, or significant architectural work
    phases: [explore, shape, plan, build, verify, simplify, review, finish, release]
    skills:
      explore:
        - office-hours
        - brainstorming
        - pencil-prototyping
      shape:
        - shaping
        - breadboarding
        - pencil-prototyping
        - kalos
      plan:
        - writing-plans
        - plan-eng-review
      build:
        - test-driven-development
      verify:
        - verification-before-completion
        - delphi
        - qa
      simplify:
        - simplify
      review:
        - review-loop
        - cso
        - codex
      finish:
        - finishing-a-development-branch
        - hermes
      release:
        - apollo
        - canary
